<!DOCTYPE html>
<html>
<body>

<H1></H1>
Amount: <input type = "text" id="amount_init">
<br>
Starting Unit: <input type = "text" id="unit_init">
<br>
<button onclick="add_unit()">Add unit.</button>
<br>
<p id="unit_section">
</p>
<button onclick="convert()">Convert.</button>
<button onclick="reset()">Reset.</button>
<p id="demo"></p>


<script>
"use strict";
function conversion (_unit_L, _x_l, _x_R, _unit_R) {
	this.unit_L = _unit_L;
	this.unit_R = _unit_R;
	this.x_L = _x_l;
	this.x_R = _x_R;
}

var num_units = 1; // inclusive of the starting unit.
var units = [];









function add_unit() {
	console.log("adding a unit");
	var str = document.getElementById("unit_section").innerHTML;
	str = str + "conversion " + num_units  + ": <input type = \"text\" id=x_" + num_units + "_L> <input type = \"text\" id=unit_" + num_units + "_L>  </<b>=</b> <input type = \"text\" id=x_" + num_units + "_R>  <input type = \"text\" id=unit_" + num_units + "_R></br>";
	console.log(document.getElementById("unit_section").innerHTML=str);
	num_units +=1;

}

function reset() {
	console.log("reset");
	document.getElementById("unit_section").innerHTML = "";
	num_units = 1;
}


function get_values(i) {

	var id_unit_L = "unit_"+i+"_L";
	var elem_unit_L = document.getElementById(id_unit_L);
	console.log(elem_unit_L);
	console.log(elem_unit_L.value);

	var id_unit_R = "unit_"+i+"_R";
	var elem_unit_R = document.getElementById(id_unit_R);
	console.log(elem_unit_R);
	console.log(elem_unit_R.value);

	var id_x_L = "x_"+i+"_L";
	var elem_x_L = document.getElementById(id_x_L);
	console.log(elem_x_L);
	console.log(elem_x_L.value);
	var x_L = elem_x_L.value;
	if (isNaN(x_L)) {
		alert(id_x_L + " is not a number ")
		return;
	}

	var id_x_R = "x_"+i+"_R";
	var elem_x_R = document.getElementById(id_x_R);
	console.log(elem_x_R);
	console.log(elem_x_R.value);
	var x_R = elem_x_R.value;
	if (isNaN(x_R)) {
		alert(id_x_R + " is not a number ")
		return;
	}

	var c = new conversion(elem_unit_L.value.trim(), parseFloat(x_L), parseFloat(x_R), elem_unit_R.value.trim());
	units.push(c);
}


function convert(){
	console.log("converting");
	var i =0;
	for ( i = 1; i < num_units; i ++ ) {
		get_values(i);
	}

	for ( i = 0; i < units.length ; i ++ ) {
		console.log("(" + units[i].unit_L + ", " + units[i].x_L + ") = (" + units[i].unit_R + ", " + units[i].x_R + ")");
	}

}


</script>

</body>
</html>
