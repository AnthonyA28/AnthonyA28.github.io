<!DOCTYPE html>
<html>
<body>

<H1></H1>
Amount: <input type = "text" id="amount_init">
<br>
Starting Unit: <input type = "text" id="unit_init">
<br>
<button onclick="add_unit()">Add unit.</button>
<br>
<p id="unit_section">
</p>
<button onclick="convert()">Convert.</button>
<button onclick="reset()">Reset.</button>
<p id="output"></p>


<script>
"use strict";
function conversion (_unit_L, _x_l, _x_R, _unit_R) {
	this.unit_L = _unit_L;
	this.unit_R = _unit_R;
	this.x_L = _x_l;
	this.x_R = _x_R;
	
}

var num_units = 1; // inclusive of the starting unit.
var units = [];
var units_used = [];
var start_unit = "";
var start_x = 0.0; 
var current_val = 0.0;









function add_unit() {
	console.log("adding a unit");
	var str = document.getElementById("unit_section").innerHTML;
	str = str + "conversion " + num_units  + ": <input type = \"text\" id=x_" + num_units + "_L> <input type = \"text\" id=unit_" + num_units + "_L>  </<b>=</b> <input type = \"text\" id=x_" + num_units + "_R>  <input type = \"text\" id=unit_" + num_units + "_R></br>";
	console.log(document.getElementById("unit_section").innerHTML=str);
	num_units +=1;

}

function reset() {
	console.log("reset");
	document.getElementById("unit_section").innerHTML = "";
	document.getElementById("output").innerHTML = "";
	num_units = 1;
	var units = [];
	var units_used = [];
	var start_unit = "";
	var start_x = 0.0; 
	var current_val = 0.0;

}


function get_values(i) {

	var id_unit_L = "unit_"+i+"_L";
	var elem_unit_L = document.getElementById(id_unit_L);
	console.log(elem_unit_L);
	console.log(elem_unit_L.value);

	var id_unit_R = "unit_"+i+"_R";
	var elem_unit_R = document.getElementById(id_unit_R);
	console.log(elem_unit_R);
	console.log(elem_unit_R.value);

	var id_x_L = "x_"+i+"_L";
	var elem_x_L = document.getElementById(id_x_L);
	console.log(elem_x_L);
	console.log(elem_x_L.value);
	var x_L = elem_x_L.value;
	if (isNaN(x_L)) {
		alert(id_x_L + " is not a number ")
		return;
	}

	var id_x_R = "x_"+i+"_R";
	var elem_x_R = document.getElementById(id_x_R);
	console.log(elem_x_R);
	console.log(elem_x_R.value);
	var x_R = elem_x_R.value;
	if (isNaN(x_R)) {
		alert(id_x_R + " is not a number ")
		return;
	}

	var c = new conversion(elem_unit_L.value.trim(), parseFloat(x_L), parseFloat(x_R), elem_unit_R.value.trim());
	units.push(c);
}


function convert(){
	document.getElementById("output").innerHTML = "";
	start_x = document.getElementById("amount_init").value;
	start_unit = document.getElementById("unit_init").value;
	current_val = start_x;
	var current_unit = start_unit; 

	console.log("start unit " + start_unit + ", start amount " + start_x);

	console.log("converting");
	var i =0;
	var j =0; 
	for ( i = 1; i < num_units; i ++ ) {
		get_values(i);
	}

	document.getElementById("output").innerHTML = "<h3> " + start_x + " " + start_unit + " </h3>";
	for ( i = 0; i < units.length ; i ++ ) {
		for( j = 0; j < units_used.length; j ++ ) {
			if ( i == units_used[j]) { // do not do anything if we have already used the conversion at this index. 
				console.log("ignoring conversion " + i );
				console.log(i + "  .. (" + units[i].unit_L + ", " + units[i].x_L + ") = (" + units[i].unit_R + ", " + units[i].x_R + ")");
				continue; 
			}
		}

		if( current_unit == units[i].unit_L) {
			console.log("found a unit to convert with L");
			current_val = current_val / units[i].x_L * units[i].x_R;
			current_unit = units[i].unit_R;
			units_used.push(i); 

		} else if ( current_unit == units[i].unit_R) {
			console.log("found a unit to convert with R");
			current_val = current_val / units[i].x_R * units[i].x_L;
			current_unit = units[i].unit_L;
			units_used.push(i); 
		}
		console.log("current: " + current_val + " " + current_unit );
		document.getElementById("output").innerHTML = document.getElementById("output").innerHTML + "</br> = " + ("" + current_val + " " + current_unit );
	}

	for ( i = 0; i < units.length ; i ++ ) {
		console.log(i + "  .. (" + units[i].unit_L + ", " + units[i].x_L + ") = (" + units[i].unit_R + ", " + units[i].x_R + ")");
	}

}


</script>

</body>
</html>
