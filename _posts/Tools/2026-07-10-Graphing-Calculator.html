  const globalDecimals=document.createElement('input'),globalDecimalsLabel=document.createElement('label');globalDecimals.id='globalDecimals';globalDecimals.type='number';globalDecimals.min='0';globalDecimals.max='12';globalDecimals.step='1';globalDecimals.value='4';globalDecimals.setAttribute('aria-label','Decimal places for all results');globalDecimalsLabel.className='global-decimals';globalDecimalsLabel.append('DP',globalDecimals);const topActions=document.querySelector('.top-actions');topActions.insertBefore(globalDecimalsLabel,topActions.firstChild);globalDecimals.addEventListener('change',()=>{const places=Math.min(12,Math.max(0,Math.round(Number(globalDecimals.value)||0)));globalDecimals.value=String(places);for(const row of rows)row.decimals=places;validateAll()});
  const syntaxHelp=document.createElement('details'),syntaxSummary=document.createElement('summary'),syntaxText=document.createElement('pre');syntaxHelp.className='syntax-help';syntaxSummary.textContent='Syntax tutorial';syntaxText.textContent=["GRAPHING CALCULATOR SYNTAX","","STRICT RULES FOR USERS AND AI GENERATORS","1. Use ONE-LETTER variable names: P, r, n, M, a, etc.","   Uppercase and lowercase are different variables.","2. Do NOT use programming identifiers such as r_annual, n_months,","   Total_Cost, or escaped underscores such as r\\_monthly.","3. Use explicit LaTeX multiplication: 12\\cdot n, not 12n.","4. Prefer \\frac{a}{b} for fractions. Plain / is also accepted.","5. Enter percentages as decimals: 6.5% becomes 0.065.","6. Use one row per line in Import/Export Text.","7. An opening quote starts comment text; no closing quote is required.","8. Arrays are parameter lists for plotting. Assign an array to one","   letter, then reference that letter in a plotted expression.","   Do not generate spreadsheet-style vector algebra assignments.","","CORRECT MORTGAGE MODEL","  \"Input parameters","  \"plot_ranges[(0,30),(0,900000)]","  P=400000 \"principal loan amount","  r=0.065 \"annual interest rate","  n=30 \"loan term in years","  j=\\frac{r}{12} \"monthly interest rate","  N=12\\cdot n \"number of payments","  M=P\\cdot\\frac{j\\cdot(1+j)^{N}}{(1+j)^{N}-1} \"monthly payment","  T=M\\cdot N \"total amount paid","  I=T-P \"total interest","  \"The following curves use x as elapsed years","  R=P\\cdot(1+j)^{12\\cdot x}-M\\cdot\\frac{(1+j)^{12\\cdot x}-1}{j} \"balance","  C=P-R \"principal paid","  K=12\\cdot M\\cdot x-C \"interest paid","  \"See <M>, <R>, <C>, and <K> in the PDF","","Expression / plot:","  x^2+2\\cdot x-3","  y=\\sin(x)","","Reusable named equation:","  V=P\\cdot(1+r)^x","  F=V+500","Named assignments receive (Eq. N) tags in PDFs.","","Full-line comment:","  \"This is a comment","The quote is hidden in the UI/PDF but retained in text export.","","Inline equation comment:","  d=350 \"distance in miles","Only text before the quote is evaluated.","","Reference a named equation inside a comment:","  \"See <V> for the model","In PDFs, <V> becomes (Eq. N); names are case-insensitive.","","Points:","  (0,3)","  [(0,3),(1,2),(2,5)]","","Parameter arrays:","  a=[-2,-1,0,1,2]","  a\\cdot x^2","This plots one curve for every value of a.","","Plot range directive (a full-line comment command):","  \"plot_ranges[(-10,10),(-5,20)]","This sets x from -10 to 10 and y from -5 to 20.","It also becomes the Home-button viewport when the set loads.","","Results:","  Green text is a computed result.","  Top DP changes all result DP controls.","  A row DP overrides only that result.","  Integers never show trailing decimal zeros."].join('\n');syntaxHelp.append(syntaxSummary,syntaxText);document.querySelector('.file-tools').prepend(syntaxHelp);
  syntaxText.textContent=syntaxText.textContent.replace('\n\nResults:','\n\nAxis label directives (full-line comment commands):\n  "x_label[Elapsed years]\n  "y_label[Balance ($)]\nLabels appear on the live plot and its PDF export.\n\nPer-result decimal places:\nUse the small DP number input beneath a result row\'s plot controls.\nText export stores the value as DP[n], and importing restores the hidden setting.\nDP[n] is not displayed in the inputter comment or PDF.\n\nResults:');

  syntaxText.textContent+='\n\nCURRENT FEATURE REFERENCE\n\nCommands (start the row with a quote):\n  "plot_ranges[(xmin,xmax),(ymin,ymax)] [hide]\n  "x_label[Horizontal axis text] [hide]\n  "y_label[Vertical axis text] [hide]\nRecognized commands are highlighted purple. [hide] removes only the\ncommand row from PDF text; it never hides an equation or its calculation.\n\nEquation comments and decimal places:\n  V=P\\cdot(1+r)^n "future value\nThe text after the quote is an inline comment. A result row\'s DP input sets\n0-12 decimal places. Text export serializes it as DP[n], while the inputter\nand PDF keep it hidden. Whole numbers remain whole numbers.\n\nPlotting:\n  y=2\\cdot x+1             function\n  x=30                      vertical line\n  (0,3)                     one point\n  [(0,3),(1,2)]             multiple points\n  a=[-2,-1,0,1,2]\n  a\\cdot x^2               one curve per value of a\nOnly plottable rows show visibility and color controls. Hover a curve or\npoint to see rendered LaTeX, its inline comment, parameters, and coordinates.\n\nPDF output:\nEquations receive Eq. numbers, comments may reference them with <name>,\ncomputed results are green, and the optional plot uses a fixed 4:3 printable\nlayout with rendered equations in its legend. The PDF font-size control also\nsets plot-label sizing. Import/Export Text preserves comments, DP values,\ncolors, line styles, and plot visibility.\n';
  syntaxText.textContent+='\nPlot-range bounds may use variables and expressions defined above them.\nCommands are plain text, so use * for multiplication:\n  n=30\n  F=1250000\n  "plot_ranges[(0,n),(0,1.1*F)] [hide]\n';
  syntaxText.textContent+='\nPlot appearance:\nUse the checkbox beside an equation to show or hide its plot.\nOpen the colored circle to choose among ten colors and solid, dashed, or dotted lines.\nThese settings do not appear in inputter comments or PDFs. Text export serializes them as color[name], line[style], and show[true/false], and importing restores them.\n';

  syntaxText.textContent=String.raw`GRAPHING CALCULATOR QUICK REFERENCE

RULES
Use one-letter variables; case matters. Write 12\cdot n, \frac{a}{b}, and
0.065 for 6.5%. Import/export uses one row per line.

INPUT
  y=\sin(x)          function       x=y^5        function of y
  x=6                vertical       y=6          horizontal
  (0,3)              point          [(0,3),(1,2)] point list
  a=[-2,-1,0,1,2]    parameter list; then use a\cdot x^2, y=a, or x=a
  \ln(x) is natural log; \log(x) is base 10.

COMMENTS
Start a blank row with " for a full-line comment, or type " after an equation
for an inline comment. Quotes cannot occur inside comments. In PDFs, <F>
references named equation F.

PLOT SETTINGS
Use the gear panel for x/y ranges and axis labels. They are saved with sets
and written to text export as hidden plot_ranges, x_label, and y_label records.

CONTROLS
Top DP changes all results; row DP (under ×) sets 0-12 places for one result.

Mobile: use Keypad pages ABC, 123, fn, and Greek; the device keyboard is off.

  "A full-line comment"
Settings follow the closed comment and are hidden in the inputter/PDF. Import
restores plot settings, DP, color, style, and visibility; old files still load.

Saved sets preserve all settings. Built-in examples cannot be deleted. PDFs
can include numbered equations, results, comments, references, and the plot.`;
