<body><div class="app">
  <aside class="panel">
    <header class="topbar"><span class="logo">∿</span><span class="title">Graphing Calculator</span><span class="top-actions"><button class="icon-btn keypad-toggle" id="keypadToggle" type="button" aria-expanded="false" aria-controls="mobileKeypad" title="Open numeric keypad">⌨ <span>Keypad</span></button><button class="icon-btn" id="clearEquations" title="Clear all equations">⌫</button><button class="icon-btn" id="reset" title="Reset">↻</button></span></header>
    <div class="expressions" id="expressions" aria-label="Expression list"></div>
    <footer class="addbar"><button class="add" id="add" title="Add expression">＋</button><span class="hint">Enter adds another expression</span></footer>
  </aside>
  <div class="panel-resizer" id="panelResizer" role="separator" aria-label="Resize expression panel" aria-orientation="vertical" tabindex="0"></div>
  <main class="graph-wrap" id="graphWrap">
    <svg class="graph" id="graph" aria-label="Graph"></svg>
    <button class="home" id="home" title="Reset view">⌂</button>
    <div class="zoom"><button id="zoomIn">＋</button><button id="zoomOut">−</button></div>
    <div class="bounds" id="bounds"><input id="xmin" value="-10" aria-label="minimum x"><input id="xmax" value="10" aria-label="maximum x"><input id="ymin" value="-10" aria-label="minimum y"><input id="ymax" value="10" aria-label="maximum y"><div class="axis-mode"><label><input type="checkbox" id="xlog"> Log x-axis</label><label><input type="checkbox" id="ylog"> Log y-axis</label><label class="intercept-option"><input type="checkbox" id="showIntercepts"> Show intercepts and coordinates</label></div></div>
    <button class="settings" id="settings" title="Graph settings">⚙</button>

  const syntaxHelp=document.createElement('details'),syntaxSummary=document.createElement('summary'),syntaxText=document.createElement('pre');syntaxHelp.className='syntax-help';syntaxSummary.textContent='Syntax tutorial';syntaxText.textContent=["GRAPHING CALCULATOR SYNTAX","","STRICT RULES FOR USERS AND AI GENERATORS","1. Use ONE-LETTER variable names: P, r, n, M, a, etc.","   Uppercase and lowercase are different variables.","2. Do NOT use programming identifiers such as r_annual, n_months,","   Total_Cost, or escaped underscores such as r\\_monthly.","3. Use explicit LaTeX multiplication: 12\\cdot n, not 12n.","4. Prefer \\frac{a}{b} for fractions. Plain / is also accepted.","5. Enter percentages as decimals: 6.5% becomes 0.065.","6. Use one row per line in Import/Export Text.","7. An opening quote starts comment text; no closing quote is required.","8. Arrays are parameter lists for plotting. Assign an array to one","   letter, then reference that letter in a plotted expression.","   Do not generate spreadsheet-style vector algebra assignments.","","CORRECT MORTGAGE MODEL","  \"Input parameters","  \"plot_ranges[(0,30),(0,900000)]","  P=400000 \"principal loan amount","  r=0.065 \"annual interest rate","  n=30 \"loan term in years","  j=\\frac{r}{12} \"monthly interest rate","  N=12\\cdot n \"number of payments","  M=P\\cdot\\frac{j\\cdot(1+j)^{N}}{(1+j)^{N}-1} \"monthly payment","  T=M\\cdot N \"total amount paid","  I=T-P \"total interest","  \"The following curves use x as elapsed years","  R=P\\cdot(1+j)^{12\\cdot x}-M\\cdot\\frac{(1+j)^{12\\cdot x}-1}{j} \"balance","  C=P-R \"principal paid","  K=12\\cdot M\\cdot x-C \"interest paid","  \"See <M>, <R>, <C>, and <K> in the PDF","","Expression / plot:","  x^2+2\\cdot x-3","  y=\\sin(x)","","Reusable named equation:","  V=P\\cdot(1+r)^x","  F=V+500","Named assignments receive (Eq. N) tags in PDFs.","","Full-line comment:","  \"This is a comment","The quote is hidden in the UI/PDF but retained in text export.","","Inline equation comment:","  d=350 \"distance in miles","Only text before the quote is evaluated.","","Reference a named equation inside a comment:","  \"See <V> for the model","In PDFs, <V> becomes (Eq. N); names are case-insensitive.","","Points:","  (0,3)","  [(0,3),(1,2),(2,5)]","","Parameter arrays:","  a=[-2,-1,0,1,2]","  a\\cdot x^2","This plots one curve for every value of a.","","Plot range directive (a full-line comment command):","  \"plot_ranges[(-10,10),(-5,20)]","This sets x from -10 to 10 and y from -5 to 20.","It also becomes the Home-button viewport when the set loads.","","Results:","  Green text is a computed result.","  Top DP changes all result DP controls.","  A row DP overrides only that result.","  Integers never show trailing decimal zeros."].join('\n');syntaxHelp.append(syntaxSummary,syntaxText);document.querySelector('.file-tools').prepend(syntaxHelp);

  syntaxText.textContent+='\n\nCURRENT FEATURE REFERENCE\n\nCommands (start the row with a quote):\n  "plot_ranges[(xmin,xmax),(ymin,ymax)] [hide]\n  "x_label[Horizontal axis text] [hide]\n  "y_label[Vertical axis text] [hide]\nRecognized commands are highlighted purple. [hide] removes only the\ncommand row from PDF text; it never hides an equation or its calculation.\n\nEquation comments and modifiers:\n  V=P\\cdot(1+r)^n "future value DP[2]\nThe text after the quote is an inline comment. DP[n] sets 0-12 decimal\nplaces for that result and is highlighted purple. Whole numbers remain\nwhole numbers. Results and plot ticks use comma grouping.\n\nPlotting:\n  y=2\\cdot x+1             function\n  x=30                      vertical line\n  (0,3)                     one point\n  [(0,3),(1,2)]             multiple points\n  a=[-2,-1,0,1,2]\n  a\\cdot x^2               one curve per value of a\nOnly plottable rows show visibility and color controls. Hover a curve or\npoint to see rendered LaTeX, its inline comment, parameters, and coordinates.\n\nPDF output:\nEquations receive Eq. numbers, comments may reference them with <name>,\ncomputed results are green, and the optional plot uses a fixed 4:3 printable\nlayout with rendered equations in its legend. The PDF font-size control also\nsets plot-label sizing. Import/Export Text preserves comments and modifiers.\n';
