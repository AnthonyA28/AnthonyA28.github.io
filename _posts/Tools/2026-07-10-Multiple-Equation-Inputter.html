    .export-toggle{position:absolute;right:12px;top:100px;width:36px;height:36px;border:1px solid #bbb;border-radius:4px;background:#fff;font-size:18px;cursor:pointer;box-shadow:0 1px 4px #0002}.export-toggle:hover{background:#f2f2f2}

<body><div class="app">
  <aside class="panel">
    <header class="topbar"><span class="logo">∿</span><span class="title">Multiple Equation Inputter</span><span class="top-actions"><button class="icon-btn" id="clearEquations" title="Clear all equations">⌫</button><button class="icon-btn" id="reset" title="Reset">↻</button></span></header>
    <div class="expressions" id="expressions" aria-label="Expression list"></div>
    <footer class="addbar"><button class="add" id="add" title="Add expression">＋</button><span class="hint">Enter adds another expression</span></footer>
  </aside>
  <div class="panel-resizer" id="panelResizer" role="separator" aria-label="Resize expression panel" aria-orientation="vertical" tabindex="0"></div>
  <main class="graph-wrap" id="graphWrap">
    <svg class="graph" id="graph" aria-label="Graph"></svg>
    <button class="home" id="home" title="Reset view">⌂</button>
    <div class="zoom"><button id="zoomIn">＋</button><button id="zoomOut">−</button></div>
    <div class="bounds" id="bounds"><input id="xmin" value="-10" aria-label="minimum x"><input id="xmax" value="10" aria-label="maximum x"><input id="ymin" value="-10" aria-label="minimum y"><input id="ymax" value="10" aria-label="maximum y"><div class="axis-mode"><label><input type="checkbox" id="xlog"> Log x-axis</label><label><input type="checkbox" id="ylog"> Log y-axis</label><label class="intercept-option"><input type="checkbox" id="showIntercepts"> Show intercepts and coordinates</label></div></div>
    <button class="settings" id="settings" title="Graph settings">⚙</button>
  </main>
  <div class="panel-resizer" id="exportResizer" role="separator" aria-label="Resize export panel" aria-orientation="vertical" tabindex="0"></div>
  <aside class="export-panel" id="exportPanel" aria-label="Equation exports"><header class="export-head"><span>Equation exports</span><select id="exportFormat" aria-label="Export format"><option value="latex">LaTeX</option><option value="word">Word equation</option></select></header><div class="file-tools"><section class="saved-sets"><div class="saved-title">Saved equation sets</div><div class="save-row"><input id="setName" placeholder="Set name" aria-label="Equation set name"><button id="saveSet">Save</button></div><div class="load-row"><select id="savedSetList" aria-label="Saved equation sets"><option value="">No saved sets</option></select><button id="loadSet">Load</button><button class="delete-set" id="deleteSet">Delete</button></div><div class="save-status" id="saveStatus"></div></section><div class="file-actions"><button id="downloadEquations">Download .txt</button><button id="showImport">Import text</button></div><div class="import-box" id="importBox"><textarea id="importText" placeholder="Paste one LaTeX equation per line…" aria-label="Equations to import"></textarea><div class="import-controls"><button id="cancelImport">Cancel</button><button class="import-apply" id="applyImport">Replace equations</button></div></div></div><div class="export-list" id="exportList"></div></aside>
</div>
<script>
  const palette=['#2d70b3','#c74440','#388c46','#6042a6','#fa7e19','#000000'];
  const list=document.querySelector('#expressions'),svg=document.querySelector('#graph'),wrap=document.querySelector('#graphWrap'),MQ=MathQuill.getInterface(2);
  let rows=[],view={xmin:-10,xmax:10,ymin:-10,ymax:10},axis={xlog:false,ylog:false,showIntercepts:false},hoverPoints=[];
  const defaultEquations=['\\alpha=2','\\omega=1.5','\\phi=\\frac{\\pi}{4}','\\alpha\\cdot\\sin\\left(\\omega\\cdot x+\\phi\\right)','0.25\\cdot x^{2}-2','\\sqrt{x+5}','e^{-0.25\\cdot x}\\cdot\\cos\\left(2\\cdot x\\right)'];
  const uid=()=>crypto.randomUUID?.()||String(Date.now()+Math.random());
  function newRow(expr=''){return{id:uid(),expr,color:palette[rows.length%palette.length],visible:true,error:'',result:''}}
  function addRow(expr='',focus=true,after=null){const row=newRow(expr),i=after?rows.findIndex(r=>r.id===after)+1:rows.length;rows.splice(i,0,row);mountRow(row,i);renumber();draw();if(focus)requestAnimationFrame(()=>inputFor(row).focus())}
  function inputFor(row){return list.querySelector(`[data-id="${row.id}"] .equation`).mathField}
  function mountRow(row,index){
    const el=document.createElement('div');el.className='expression';el.dataset.id=row.id;el.style.setProperty('--row-color',row.color);
    el.innerHTML=`<div class="gutter"><button class="color" title="Show or hide expression"></button></div><div class="entry"><div class="equation-wrap"><span class="equation"></span></div><div class="error"></div></div><button class="remove" title="Delete expression">×</button>`;
    el.querySelector('.error').className='feedback';
    const host=el.querySelector('.equation'),color=el.querySelector('.color'),colorPicker=document.createElement('input');colorPicker.type='color';colorPicker.value=row.color;colorPicker.hidden=true;color.after(colorPicker);color.title='Choose color (right-click to show or hide)';
    const field=MQ.MathField(host,{spaceBehavesLikeTab:true,autoCommands:'pi tau theta phi sqrt sum prod alpha beta gamma delta lambda mu sigma omega',autoOperatorNames:'sin cos tan sec csc cot log ln abs exp floor ceil round',handlers:{edit:f=>{row.expr=f.latex();validateAll();draw()},enter:()=>addRow('',true,row.id),upOutOf:()=>{const i=rows.indexOf(row);if(i>0)inputFor(rows[i-1]).focus()},downOutOf:()=>{const i=rows.indexOf(row);if(i<rows.length-1)inputFor(rows[i+1]).focus()},deleteOutOf:()=>{const i=rows.indexOf(row);if(!field.latex()&&rows.length>1)removeRow(row,Math.max(0,i-1))}}});host.mathField=field;if(row.expr)field.latex(row.expr);
    host.addEventListener('focusin',()=>el.classList.add('active'));host.addEventListener('focusout',()=>el.classList.remove('active'));
    const toggleRow=()=>{row.visible=!row.visible;color.classList.toggle('off',!row.visible);draw()};color.addEventListener('click',e=>{if(e.shiftKey||e.altKey)toggleRow();else colorPicker.click()});colorPicker.addEventListener('input',()=>{row.color=colorPicker.value;el.style.setProperty('--row-color',row.color);draw()});color.addEventListener('contextmenu',e=>{e.preventDefault();toggleRow()});
    el.querySelector('.remove').addEventListener('click',()=>removeRow(row));
    const before=list.children[index];before?list.insertBefore(el,before):list.appendChild(el);validate(row,el)
  }
  function removeRow(row,focusIndex){const i=rows.indexOf(row);rows.splice(i,1);list.querySelector(`[data-id="${row.id}"]`).remove();if(!rows.length)addRow('',false);renumber();draw();const target=rows[focusIndex??Math.min(i,rows.length-1)];if(target)inputFor(target).focus()}
  function renumber(){[...list.children].forEach((el,i)=>el.querySelector('.gutter').dataset.number=i+1)}
  function latexToMath(s){return s.replace(/\\left|\\right/g,'').replace(/\\cdot|\\times/g,'*').replace(/\\operatorname\{([^}]+)\}/g,'$1').replace(/\\(sin|cos|tan|sec|csc|cot|log|ln|sqrt|exp|abs|floor|ceil)/g,'$1').replace(/\\(pi|tau|theta|phi|alpha|beta|gamma|delta|lambda|mu|sigma|omega)/g,'$1').replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g,'(($1)/($2))').replace(/\^\{([^{}]+)\}/g,'^($1)').replace(/_\{([^{}]+)\}/g,'_($1)').replace(/\{/g,'(').replace(/\}/g,')')}
  function compile(row){if(!row.expr.trim())return null;return math.compile(latexToMath(row.expr.trim()))}
  function isDefinition(row){return /^\s*[A-Za-z][A-Za-z0-9_]*\s*=/.test(latexToMath(row.expr))}
  function splitTopLevel(s){const parts=[];let depth=0,start=0;for(let i=0;i<s.length;i++){if('([{'.includes(s[i]))depth++;else if(')]}'.includes(s[i]))depth--;else if(s[i]===','&&depth===0){parts.push(s.slice(start,i).trim());start=i+1}}parts.push(s.slice(start).trim());return parts}
  function pointValues(source,scope){source=source.replace(/\\(?:lbrack|rbrack)/g,m=>m.includes('lbrack')?'[':']').replace(/\\[,;:!]|\s/g,'');let items;if(source.startsWith('[')&&source.endsWith(']'))items=splitTopLevel(source.slice(1,-1));else items=[source];if(!items.length)return null;const points=[];for(const item of items){const wrapped=(item.startsWith('(')&&item.endsWith(')'))||(item.startsWith('[')&&item.endsWith(']'));if(!wrapped)return null;const coordinates=splitTopLevel(item.slice(1,-1));if(coordinates.length!==2)return null;const x=Number(math.evaluate(coordinates[0],scope)),y=Number(math.evaluate(coordinates[1],scope));if(!Number.isFinite(x)||!Number.isFinite(y))throw Error('Point coordinates must be numbers');points.push({x,y})}return points}
  function arrayDefinition(source,scope){const match=source.match(/^\s*([A-Za-z][A-Za-z0-9_]*)\s*=\s*\[([\s\S]*)\]\s*$/);if(!match)return null;const items=splitTopLevel(match[2]);if(!items.length||items.some(item=>!item))throw Error('Array cannot be empty');const values=items.map(item=>Number(math.evaluate(item,scope)));if(values.some(value=>!Number.isFinite(value)))throw Error('Array values must be numbers');return{name:match[1],values}}
  function buildScopes(){const scope={x:0,pi:Math.PI,e:Math.E},scopes=new Map();for(const row of rows){row.error='';row.result='';row.points=null;scopes.set(row,{...scope});if(!row.expr.trim())continue;try{const source=latexToMath(row.expr.trim()),array=arrayDefinition(source,scope);if(array){scope[array.name]=array.values;scopes.set(row,{...scope});row.result=`${array.values.length} values`;continue}const points=pointValues(source,scope);if(points){row.points=points;row.result=points.length===1?`Point (${formatResult(points[0].x)}, ${formatResult(points[0].y)})`:`${points.length} points`;continue}const code=math.compile(source),dependsOnX=math.parse(source).filter(n=>n.isSymbolNode&&n.name==='x').length>0;if(isDefinition(row)){const result=code.evaluate(scope);scopes.set(row,{...scope});if(typeof result==='function')throw Error('Functions are not supported yet');if(!dependsOnX&&typeof result==='number'&&Number.isFinite(result))row.result=`= ${formatResult(result)}`}else{const results=expandedScopes(row,scope).map(variant=>code.evaluate(variant));if(!dependsOnX&&results.length===1&&typeof results[0]==='number'&&Number.isFinite(results[0]))row.result=`= ${formatResult(results[0])}`}}catch(e){row.error=isDefinition(row)?e.message||'Invalid variable definition':e.message==='Point coordinates must be numbers'?e.message:'Unknown variable or invalid expression'}}return scopes}
  function formatResult(n){if(Math.abs(n)<1e-14)return'0';return Number(n.toPrecision(12)).toString()}
  function expandedScopes(row,base){let variants=[{...base}];let symbols=[];try{symbols=math.parse(latexToMath(row.expr)).filter(n=>n.isSymbolNode).map(n=>n.name)}catch{return variants}for(const name of [...new Set(symbols)]){if(name==='x')continue;const value=base[name],items=Array.isArray(value)?value:value?.toArray?.();if(!Array.isArray(items)||!items.length)continue;const numeric=items.flat(Infinity).map(Number).filter(Number.isFinite);if(numeric.length)variants=variants.flatMap(scope=>numeric.map(item=>({...scope,[name]:item})))}return variants}
  function curveLabel(row,base,variant){const parameters=[];for(const [name,value] of Object.entries(base)){const items=Array.isArray(value)?value:value?.toArray?.();if(Array.isArray(items)&&typeof variant[name]==='number')parameters.push(`${name} = ${formatResult(variant[name])}`)}const expression=wordEquation(row.expr);return parameters.length?`${expression} (${parameters.join(', ')})`:expression}
  function validateAll(){buildScopes();for(const row of rows){const el=list.querySelector(`[data-id="${row.id}"]`);if(!el)continue;const feedback=el.querySelector('.feedback');el.classList.toggle('invalid',!!row.error);feedback.className=`feedback ${row.error?'error':'result'}`;feedback.textContent=row.error||row.result}}
  function validate(){validateAll()}
  function values(){return['xmin','xmax','ymin','ymax'].map(id=>Number(document.querySelector('#'+id).value))}
  function niceStep(span){const rough=span/10,p=10**Math.floor(Math.log10(rough)),n=rough/p;return(n<2?1:n<5?2:5)*p}
  function draw(){
    const w=wrap.clientWidth||800,h=wrap.clientHeight||600,[xmin,xmax,ymin,ymax]=[view.xmin,view.xmax,view.ymin,view.ymax];svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
    const tx=x=>axis.xlog?Math.log10(x):x,ty=y=>axis.ylog?Math.log10(y):y;
    const ux=p=>axis.xlog?10**p:p,uy=p=>axis.ylog?10**p:p;
    const ax=tx(xmin),bx=tx(xmax),ay=ty(ymin),by=ty(ymax);
    const sx=x=>((tx(x)-ax)/(bx-ax))*w,sy=y=>h-((ty(y)-ay)/(by-ay))*h,parts=[];
    const xs=niceStep(xmax-xmin),ys=niceStep(ymax-ymin);
    const xTicks=axis.xlog?Array.from({length:Math.ceil(bx)-Math.floor(ax)+1},(_,i)=>10**(Math.floor(ax)+i)):Array.from({length:Math.ceil((xmax-Math.ceil(xmin/xs)*xs)/xs)+1},(_,i)=>Math.ceil(xmin/xs)*xs+i*xs);
    const yTicks=axis.ylog?Array.from({length:Math.ceil(by)-Math.floor(ay)+1},(_,i)=>10**(Math.floor(ay)+i)):Array.from({length:Math.ceil((ymax-Math.ceil(ymin/ys)*ys)/ys)+1},(_,i)=>Math.ceil(ymin/ys)*ys+i*ys);
    for(const x of xTicks)if(x>=xmin&&x<=xmax)parts.push(`<line x1="${sx(x)}" y1="0" x2="${sx(x)}" y2="${h}" stroke="#ddd"/><text x="${sx(x)+3}" y="${axis.ylog?h-5:Math.min(h-4,Math.max(13,sy(0)+14))}" fill="#888" font-size="11">${+x.toPrecision(6)}</text>`);
    for(const y of yTicks)if(y>=ymin&&y<=ymax)parts.push(`<line x1="0" y1="${sy(y)}" x2="${w}" y2="${sy(y)}" stroke="#ddd"/><text x="${axis.xlog?3:Math.min(w-30,Math.max(3,sx(0)+4))}" y="${sy(y)-3}" fill="#888" font-size="11">${+y.toPrecision(6)}</text>`);
