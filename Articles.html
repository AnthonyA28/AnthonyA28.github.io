---
layout: page
title: Articles
---
<!-- <h1>Latest Posts</h1> -->

<ul>
  {% for post in site.posts %}
    {% if post.section == "article" %}
    <li>
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <small>{{ post.date | date_to_string }}</small>
      <p>  {{ post.excerpt }}   </p>
    </li>
    {% endif %}
  {% endfor %}
</ul>
